name: Docker CI Pipeline

on:
  push:
    branches:
      - main

    tags:
      - "v*"

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Give execute permission to mvnw
        run: chmod +x mvnw
        working-directory: ./backend

      - name: Build JAR
        run: ./mvnw clean package -DskipTests
        working-directory: ./backend

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Image Variables
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/docker-ci-demo:latest \
          -t ${{ secrets.DOCKER_USERNAME }}/docker-ci-demo:${{ env.IMAGE_TAG }} \
          ./backend

      - name: Build Semantic Version Image
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          docker tag \
          ${{ secrets.DOCKER_USERNAME }}/docker-ci-demo:latest \
          ${{ secrets.DOCKER_USERNAME }}/docker-ci-demo:${{ env.VERSION }}

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/docker-ci-demo:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/docker-ci-demo:${{ env.IMAGE_TAG }}

      - name: Push Semantic Version Image
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/docker-ci-demo:${{ env.VERSION }}

      - name: Set Version
        run: |
          MAJOR=1
          MINOR=0
          PATCH=${GITHUB_RUN_NUMBER}

          VERSION=v${MAJOR}.${MINOR}.${PATCH}

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
