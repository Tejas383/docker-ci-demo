name: Docker CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build JAR
        run: mvn clean package

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Image Tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/docker-ci-demo:latest \
          -t ${{ secrets.DOCKER_USERNAME }}/docker-ci-demo:${{ env.IMAGE_TAG }} .

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/docker-ci-demo:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/docker-ci-demo:${{ env.IMAGE_TAG }}
