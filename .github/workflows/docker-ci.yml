name: Docker CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Give execute permission to mvnw
        run: chmod +x mvnw
        working-directory: ./backend

      - name: Build JAR
        run: ./mvnw clean package -DskipTests
        working-directory: ./backend

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Image Variables
        run: |
          MAJOR=1
          MINOR=0
          PATCH=${GITHUB_RUN_NUMBER}

          VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          IMAGE_TAG="${GITHUB_SHA::7}"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Debug Variables
        run: |
          echo "VERSION=$VERSION"
          echo "IMAGE_TAG=$IMAGE_TAG"

      - name: Build Docker Image
        env:
          VERSION: ${{ env.VERSION }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          echo "Building version: $VERSION"

          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/docker-ci-demo:latest \
          -t ${{ secrets.DOCKER_USERNAME }}/docker-ci-demo:$IMAGE_TAG \
          -t ${{ secrets.DOCKER_USERNAME }}/docker-ci-demo:$VERSION \
          ./backend

      - name: Push Docker Images
        env:
          VERSION: ${{ env.VERSION }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/docker-ci-demo:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/docker-ci-demo:$IMAGE_TAG
          docker push ${{ secrets.DOCKER_USERNAME }}/docker-ci-demo:$VERSION
